name: SDK Generation

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force SDK generation even if no changes are detected
        required: false
        default: "false"
        type: string
      feature_branch:
        description: Branch for SDK changes
        required: false
        type: string
      environment:
        description: Environment variables (e.g., TAG=branch-name)
        required: false
        type: string
  schedule:
    - cron: "0 6 * * 1"

# Serialize generations: overlapping cron/dispatch runs race on the same
# branch/PR. Queue instead of cancel so a triggered regen is never dropped.
concurrency:
  group: sdk-generation
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: write
  statuses: write

jobs:
  generate:
    # The Speakeasy reusable executor (workflow-executor.yaml) only accepts
    # github_access_token from the caller's secrets context, and a step-minted
    # app token cannot cross jobs (the runner drops masked job outputs), so
    # this inlines the executor's run-workflow job at the same pinned action
    # SHA. Publish jobs are skipped in pr mode, so nothing else is lost.
    runs-on: ubuntu-latest
    outputs:
      # The exact branch this run generated onto; auto-approve must not
      # guess a regen PR by branch prefix.
      branch_name: ${{ steps.speakeasy.outputs.branch_name }}
    steps:
      - name: Mint bot app token
        id: bot-token
        # Pin to commit SHA for v1 (mutable tags can be retargeted).
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SDK_BOT_APP_ID }}
          private-key: ${{ secrets.SDK_BOT_APP_KEY }}

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          # App token, not GITHUB_TOKEN: PRs opened with GITHUB_TOKEN do not
          # trigger pull_request workflows, so verify CI would never run on
          # them. The convoy-sdk-bot app token triggers CI like a PAT.
          token: ${{ steps.bot-token.outputs.token }}

      - name: Checkout sdk-generation-action repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: speakeasy-api/sdk-generation-action
          # Same pinned ref the v15 reusable executor uses internally.
          ref: 7625cebc33f047f014c65479a7743c3ac337c2f0
          path: _speakeasy

      - name: Run Generation Workflow
        id: speakeasy
        uses: ./_speakeasy
        with:
          github_access_token: ${{ steps.bot-token.outputs.token }}
          speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
          mode: pr
          force: ${{ inputs.force || 'false' }}
          feature_branch: ${{ inputs.feature_branch }}
          cli_environment_variables: ${{ inputs.environment }}

  auto-approve:
    # Finds the regen PR by the branch the Speakeasy executor manages
    # (speakeasy-sdk-regen-* or the validated feature_branch input).
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Mint reviewer app token
        id: app-token
        # Pin to commit SHA for v1 (mutable tags can be retargeted).
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SDK_REVIEWER_APP_ID }}
          private-key: ${{ secrets.SDK_REVIEWER_APP_KEY }}

      - name: Mint bot app token
        id: bot-token
        # Minted per job: a masked app token cannot cross job boundaries.
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SDK_BOT_APP_ID }}
          private-key: ${{ secrets.SDK_BOT_APP_KEY }}

      - name: Approve and enable auto-merge
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          # Merge via the bot app token, not GITHUB_TOKEN: merges performed
          # by GITHUB_TOKEN do not trigger the downstream publish workflows.
          MERGE_TOKEN: ${{ steps.bot-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          # The exact branch the generate job pushed, reported by the
          # Speakeasy action itself. Never guess a regen PR by branch prefix:
          # a leftover regen branch from another run must not get this run's
          # approval.
          GENERATED_BRANCH: ${{ needs.generate.outputs.branch_name }}
        run: |
          # Failure policy: fail open to human review, never to merge. Any
          # gate miss below (wrong author, non-generated paths) leaves the PR
          # unapproved for a human. Clearing a stale auto-merge is the one
          # hard failure: if --disable-auto errors, this step goes red
          # instead of leaving a rejected head silently mergeable.
          set -euo pipefail

          deny() {
            # Auto-merge is cleared before commenting: under set -e a comment
            # failure must not skip the disable, and a disable failure must
            # fail the step, not be swallowed.
            enabled=$(GH_TOKEN="$APP_TOKEN" gh pr view "$pr" --json autoMergeRequest --jq '.autoMergeRequest != null')
            if [ "$enabled" = "true" ]; then
              GH_TOKEN="$MERGE_TOKEN" gh pr merge "$pr" --disable-auto
            fi
            printf '%s\n' "$1" | GH_TOKEN="$APP_TOKEN" gh pr comment "$pr" --body-file - || true
            exit 0
          }

          branch="$GENERATED_BRANCH"
          if [ -z "$branch" ]; then
            echo "Generate job reported no branch (no regeneration); nothing to approve."
            exit 0
          fi

          pr_json=$(GH_TOKEN="$APP_TOKEN" gh pr list --head "$branch" --state open \
            --json number,baseRefName,headRefOid --jq '.[0] // empty')
          if [ -z "$pr_json" ]; then
            echo "No open PR for $branch; nothing to approve."
            exit 0
          fi
          pr=$(echo "$pr_json" | jq -r .number)
          base=$(echo "$pr_json" | jq -r .baseRefName)
          # Captured before the changed-files listing so the approval below
          # is pinned to the exact head the allowlist ran against.
          head_sha=$(echo "$pr_json" | jq -r .headRefOid)

          if [ "$base" != "main" ]; then
            echo "Not approving PR #$pr: base is $base, not main."
            deny "SDK reviewer app: not auto-approving; the PR base is \`$base\`, not \`main\`. Left for human review (policy: fail open to human review, never to merge)."
          fi

          # Only regen PRs authored by the bot app qualify for auto-review.
          # REST is used because it returns the stable "convoy-sdk-bot[bot]"
          # login for app-authored PRs.
          author=$(GH_TOKEN="$APP_TOKEN" gh api "repos/$GH_REPO/pulls/$pr" --jq '.user.login')
          if [ "$author" != "convoy-sdk-bot[bot]" ]; then
            echo "Not approving PR #$pr: author is $author, not convoy-sdk-bot[bot]."
            deny "SDK reviewer app: not auto-approving; PR author is not convoy-sdk-bot[bot]. Left for human review (policy: fail open to human review, never to merge)."
          fi

          # The generate job pushed a real diff, so an empty changed-files
          # listing is an API anomaly, not a clean PR; it must not count as
          # an allowlist pass.
          files=$(GH_TOKEN="$APP_TOKEN" gh api "repos/$GH_REPO/pulls/$pr/files" --paginate \
            --jq '.[] | .filename, (.previous_filename // empty)')
          if [ -z "$files" ]; then
            echo "Not approving PR #$pr: changed-files listing came back empty."
            deny "SDK reviewer app: not auto-approving; the changed-files listing came back empty for a regen PR. Left for human review (policy: fail open to human review, never to merge)."
          fi

          # Allowlist mirrors the Speakeasy-managed paths (trackedFiles in
          # .speakeasy/gen.lock, incl. tsconfig.json and .oxlintrc.json);
          # .genignore paths (hand-written webhook verify, its tests,
          # contributor docs) are denied explicitly. Renames are checked on
          # both sides so a file cannot be moved into the generated tree
          # from outside it.
          bad=$(printf '%s\n' "$files" \
            | while read -r f; do
                case "$f" in
                  src/webhook.ts|src/utils/errors/*) echo "$f" ;;
                  tests/signature-vectors.json|tests/shared-vectors.test.ts|tests/webhook.test.ts) echo "$f" ;;
                  .speakeasy/*|docs/*|examples/*|src/*|tests/*) ;;
                  RELEASES.md|README.md|USAGE.md|FUNCTIONS.md|RUNTIMES.md) ;;
                  jsr.json|package.json|package-lock.json|.gitattributes|.npmignore) ;;
                  tsconfig.json|.oxlintrc.json) ;;
                  *) echo "$f" ;;
                esac
              done)
          if [ -n "$bad" ]; then
            echo "Not approving PR #$pr: diff touches non-generated paths:"
            echo "$bad"
            deny "$(printf '%s\n' \
              "SDK reviewer app: not auto-approving; the diff touches paths outside the generated allowlist:" \
              "" '```' "$bad" '```' "" \
              "Left for human review (policy: fail open to human review, never to merge).")"
          fi

          review_id=$(GH_TOKEN="$APP_TOKEN" gh api -X POST "repos/$GH_REPO/pulls/$pr/reviews" \
            -f event=APPROVE \
            -f commit_id="$head_sha" \
            -f body="SDK reviewer app: approving a generated-paths-only diff on the regen branch. Auto-merge completes only after required status checks pass." \
            --jq '.id')

          # Close the validate-then-approve race: a push landing between the
          # allowlist check and the approval is not covered by
          # dismiss_stale_reviews (that only dismisses on pushes after the
          # review), so re-read the head and dismiss our own approval if it
          # moved off the validated commit.
          now_sha=$(GH_TOKEN="$APP_TOKEN" gh pr view "$pr" --json headRefOid --jq '.headRefOid')
          if [ "$now_sha" != "$head_sha" ]; then
            echo "Head moved from $head_sha to $now_sha during approval; dismissing review."
            # Best-effort: dismiss_stale_reviews normally dismissed this
            # approval already when the head moved. The hard gate is deny
            # below, which clears auto-merge or fails the step; a dismiss
            # error must not skip it.
            GH_TOKEN="$APP_TOKEN" gh api -X PUT "repos/$GH_REPO/pulls/$pr/reviews/$review_id/dismissals" \
              -f message="Head moved during approval; the approved commit is no longer the PR head." \
              -f event=DISMISS || true
            deny "SDK reviewer app: approval dismissed; the PR head changed while the review was being submitted. Left for human review (policy: fail open to human review, never to merge)."
          fi

          # Post-validation head drift is closed by branch protection, not
          # here: the approval is pinned to the validated commit_id and
          # dismiss_stale_reviews dismisses it on any later push, so
          # auto-merge fail-closes back to human review.
          enabled=$(GH_TOKEN="$APP_TOKEN" gh pr view "$pr" --json autoMergeRequest --jq '.autoMergeRequest != null')
          if [ "$enabled" = "true" ]; then
            echo "Auto-merge already enabled on PR #$pr."
          else
            GH_TOKEN="$MERGE_TOKEN" gh pr merge "$pr" --auto --squash
          fi
